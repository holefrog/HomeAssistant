start_timer:
  alias: "语音倒计时"
  mode: restart
  fields:
    seconds:
      description: "倒计时秒数"
      default: 30
  sequence:
    - delay:
        seconds: "{{ seconds | int(0) }}"
    - repeat:
        count: 10
        sequence:
          - service: media_player.play_media
            target:
              entity_id: media_player.rpi_squeeze
            data:
              media_content_id: "{{ states('input_text.media_root') }}countdown.wav"
              media_content_type: "music"
          - delay:
              seconds: 8
